version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PGHOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - server_data:/app/data
      - server_backups:/app/backups

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  server_data:
  server_backups:
