server {
    listen 80;
    listen [::]:80;
    server_name examcell.mitwpu.edu.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name examcell.mitwpu.edu.in;

    ssl_certificate /etc/letsencrypt/live/examcell.mitwpu.edu.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/examcell.mitwpu.edu.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Client Static Build
    location / {
        root /var/www/mitwpu-exam/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy Routing
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.io Upgrade Proxy
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Disable payload limits for PDF generating uploads
    client_max_body_size 20M;
}
